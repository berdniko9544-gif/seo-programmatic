name: ISR Content Update

on:
  schedule:
    # Run every 6 hours to regenerate content
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
  SATELLITE_PARENT_DOMAIN: ${{ secrets.SATELLITE_PARENT_DOMAIN }}
  MAIN_SITE_URL: ${{ secrets.MAIN_SITE_URL }}
  MAIN_SITE_REVALIDATE_URL: ${{ secrets.MAIN_SITE_REVALIDATE_URL }}
  MAIN_SITE_REVALIDATE_SECRET: ${{ secrets.MAIN_SITE_REVALIDATE_SECRET }}
  # (Cloudflare deploy creds are not required here; this workflow only hits /api/revalidate)
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  trigger-isr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Trigger ISR revalidation
        run: node scripts/trigger-isr.js
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Summary
        run: echo "✅ ISR revalidation triggered for all satellites"
