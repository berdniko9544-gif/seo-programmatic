name: Daily Satellite Generation

on:
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

env:
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  # Cloudflare deploy
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  # Domain for satellites (e.g. sat.example.com)
  SATELLITE_PARENT_DOMAIN: ${{ secrets.SATELLITE_PARENT_DOMAIN }}
  # Optional SEO submission
  YANDEX_WEBMASTER_TOKEN: ${{ secrets.YANDEX_WEBMASTER_TOKEN }}
  YANDEX_USER_ID: ${{ secrets.YANDEX_USER_ID }}
  REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}

jobs:
  generate-satellites:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # allow long full runs (max 6h)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci


      - name: Generate satellites with AI content + build + deploy
        run: node scripts/daily-generator.js
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SATELLITE_PARENT_DOMAIN: ${{ secrets.SATELLITE_PARENT_DOMAIN }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          DAILY_SATELLITES: '20'
          PAGES_PER_SATELLITE: '300'

      - name: Submit sitemaps to Yandex (Webmaster API)
        # Runs even if Yandex secrets are missing; script will fall back to manual instructions
        if: always()
        run: node scripts/submit-to-search.js
        env:
          YANDEX_WEBMASTER_TOKEN: ${{ secrets.YANDEX_WEBMASTER_TOKEN }}
          YANDEX_USER_ID: ${{ secrets.YANDEX_USER_ID }}

      - name: Upload generation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generation-logs
          path: logs/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload satellite URLs list
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: satellite-urls
          path: satellites/urls.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Upload satellite registry (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: satellite-registry
          path: |
            satellites/
            */satellites/
          retention-days: 7
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        run: |
          echo "Daily satellite generation failed!"
          echo "Check logs for details"

      - name: Summary
        if: success()
        run: |
          echo "✅ Daily generation complete!"
          echo "📊 Generated 20 satellites with 300 pages each"
          echo "📈 Total: 6,000 new pages"
          echo "🌐 Satellite domain: *.${SATELLITE_PARENT_DOMAIN}"
          echo "☁️ Deployed to Cloudflare Workers (OpenNext)"
