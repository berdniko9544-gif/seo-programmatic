name: Daily Satellite Generation

on:
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

env:
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_TEAM: ${{ secrets.VERCEL_TEAM }}
  YANDEX_WEBMASTER_TOKEN: ${{ secrets.YANDEX_WEBMASTER_TOKEN }}
  YANDEX_USER_ID: ${{ secrets.YANDEX_USER_ID }}

jobs:
  generate-satellites:
    runs-on: ubuntu-latest
    timeout-minutes: 180 # 3 hours max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Generate satellites with AI content
        run: node scripts/daily-generator.js
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM: ${{ secrets.VERCEL_TEAM }}
          # Reduce runtime if needed (defaults are 20/1000)
          DAILY_SATELLITES: '5'
          PAGES_PER_SATELLITE: '200'

      - name: Upload generation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generation-logs
          path: logs/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload satellite registry (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: satellite-registry
          path: satellites/
          retention-days: 7
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        run: |
          echo "Daily satellite generation failed!"
          echo "Check logs for details"

      - name: Summary
        if: success()
        run: |
          echo "✅ Daily generation complete!"
          echo "📊 Generated 20 satellites with 1000 pages each"
          echo "📈 Total: 20,000 new pages"
