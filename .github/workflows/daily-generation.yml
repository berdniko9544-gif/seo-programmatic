name: Daily Satellite Generation

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      daily_satellites:
        description: 'Number of satellites for a manual run'
        required: false
        default: '1'
      pages_per_satellite:
        description: 'Target pages per satellite for a manual run'
        required: false
        default: '1000'

env:
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  SATELLITE_PARENT_DOMAIN: ${{ secrets.SATELLITE_PARENT_DOMAIN }}
  YANDEX_WEBMASTER_TOKEN: ${{ secrets.YANDEX_WEBMASTER_TOKEN }}
  YANDEX_USER_ID: ${{ secrets.YANDEX_USER_ID }}
  REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
  MAIN_SITE_URL: 'https://1mb3-guide-2026.vercel.app'

jobs:
  generate-satellites:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate satellites with AI content + build + deploy
        run: node scripts/daily-generator.js
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SATELLITE_PARENT_DOMAIN: ${{ secrets.SATELLITE_PARENT_DOMAIN }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          MAIN_SITE_URL: ${{ env.MAIN_SITE_URL }}
          DAILY_SATELLITES: ${{ github.event.inputs.daily_satellites || '20' }}
          PAGES_PER_SATELLITE: ${{ github.event.inputs.pages_per_satellite || '1000' }}

      - name: Submit sitemaps to Yandex (Webmaster API)
        if: always()
        run: node scripts/submit-to-search.js
        env:
          YANDEX_WEBMASTER_TOKEN: ${{ secrets.YANDEX_WEBMASTER_TOKEN }}
          YANDEX_USER_ID: ${{ secrets.YANDEX_USER_ID }}

      - name: Upload generation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generation-logs
          path: logs/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload satellite URLs list
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: satellite-urls
          path: satellites/urls.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Upload satellite registry (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: satellite-registry
          path: |
            satellites/
            */satellites/
          retention-days: 7
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        run: |
          echo "Daily satellite generation failed!"
          echo "Check logs for details"

      - name: Summary
        if: success()
        env:
          DAILY_SATELLITES: ${{ github.event.inputs.daily_satellites || '20' }}
          PAGES_PER_SATELLITE: ${{ github.event.inputs.pages_per_satellite || '1000' }}
          MAIN_SITE_URL: ${{ env.MAIN_SITE_URL }}
        run: |
          echo "Daily generation complete"
          echo "Target satellites: $DAILY_SATELLITES"
          echo "Target pages per satellite: $PAGES_PER_SATELLITE"
          echo "Satellite domain: *.${SATELLITE_PARENT_DOMAIN}"
          echo "Main hub: $MAIN_SITE_URL"
          echo "Deployed to Cloudflare Workers (OpenNext)"
