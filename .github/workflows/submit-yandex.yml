name: Submit existing satellites to Yandex

on:
  workflow_dispatch:
    inputs:
      daily_run_id:
        description: 'Optional: Daily Satellite Generation run ID to pull urls.txt from (e.g. 23088318282). Leave empty to use latest successful run.'
        required: false
        type: string

env:
  YANDEX_WEBMASTER_TOKEN: ${{ secrets.YANDEX_WEBMASTER_TOKEN }}
  YANDEX_USER_ID: ${{ secrets.YANDEX_USER_ID }}

jobs:
  submit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve Daily run ID (latest successful with satellite-urls)
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const input = (context.payload.inputs && context.payload.inputs.daily_run_id) ? String(context.payload.inputs.daily_run_id).trim() : '';
            if (input) {
              core.setOutput('run_id', input);
              return;
            }

            // Daily Satellite Generation workflow id in this repo
            const WORKFLOW_ID = 244675251;

            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: WORKFLOW_ID,
              status: 'completed',
              per_page: 50,
            });

            const successes = (runs.data.workflow_runs || []).filter(r => r.conclusion === 'success');
            if (successes.length === 0) {
              core.setFailed('No successful Daily Satellite Generation runs found. Provide daily_run_id input.');
              return;
            }

            // Pick the newest successful run that actually has the 'satellite-urls' artifact.
            for (const run of successes) {
              const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100,
              });

              const found = (artifacts.data.artifacts || []).some(a => a.name === 'satellite-urls' && !a.expired);
              if (found) {
                core.info(`Using latest successful daily run with satellite-urls: ${run.id}`);
                core.setOutput('run_id', String(run.id));
                return;
              }
            }

            core.setFailed('No successful Daily Satellite Generation runs with satellite-urls artifact found. Run Daily Satellite Generation (new version) once, or provide daily_run_id explicitly.');

      - name: Download satellite-urls artifact (satellites/urls.txt)
        uses: actions/download-artifact@v4
        with:
          name: satellite-urls
          path: satellites
          run-id: ${{ steps.resolve.outputs.run_id }}

      - name: Verify urls.txt
        run: |
          if [ ! -f satellites/urls.txt ]; then
            echo "❌ satellites/urls.txt not found in downloaded artifact"
            ls -la satellites || true
            exit 1
          fi

          echo "✅ urls.txt downloaded"
          wc -l satellites/urls.txt || true
          head -n 5 satellites/urls.txt || true

      - name: Submit to Yandex Webmaster API
        run: node scripts/submit-to-search.js
