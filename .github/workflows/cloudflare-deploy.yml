name: Deploy main site to Cloudflare Workers (OpenNext)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (Webpack)
        run: npm run build

      - name: Build OpenNext bundle
        run: npx @opennextjs/cloudflare build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.toml --var REVALIDATE_SECRET:${{ secrets.REVALIDATE_SECRET }} --var DEEPSEEK_API_KEY:${{ secrets.DEEPSEEK_API_KEY }} --var YANDEX_WEBMASTER_TOKEN:${{ secrets.YANDEX_WEBMASTER_TOKEN }} --var YANDEX_USER_ID:${{ secrets.YANDEX_USER_ID }}
